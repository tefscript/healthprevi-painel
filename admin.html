<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthPrevi — Painel de Leads</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; color: #1e3264; }

    /* ── Login ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: #fff; border-radius: 10px; padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(30,50,100,.12); width: 100%; max-width: 380px;
    }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-logo svg { width: 36px; height: 36px; }
    .login-logo span { font-size: 20px; font-weight: 700; color: #1e3264; }
    .login-logo span em { color: #2e7d32; font-style: normal; }
    .login-card h2 { font-size: 16px; font-weight: 600; color: #5a6e99; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #c5cfe0; border-radius: 6px;
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #2e7d32; box-shadow: 0 0 0 3px rgba(46,125,50,.1); }
    .btn-primary {
      width: 100%; height: 44px; background: #2e7d32; color: #fff;
      border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background .2s;
    }
    .btn-primary:hover { background: #256427; }
    .login-error { color: #c62828; font-size: 13px; margin-top: 10px; display: none; }

    /* ── App ── */
    #appScreen { display: none; }

    header {
      background: #1e3264; color: #fff; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo svg { width: 30px; height: 30px; }
    header .logo span { font-size: 18px; font-weight: 700; }
    header .logo span em { color: #66bb6a; font-style: normal; }
    header .user-info { font-size: 13px; color: #90caf9; display: flex; align-items: center; gap: 12px; }
    .btn-logout { background: none; border: 1px solid #546e9a; color: #90caf9; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,.08); }

    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 8px; padding: 16px 20px; border: 1px solid #c5cfe0; }
    .stat-card .num  { font-size: 28px; font-weight: 700; color: #1e3264; }
    .stat-card .lbl  { font-size: 12px; color: #5a6e99; margin-top: 2px; }

    .section-title {
      font-size: 16px; font-weight: 600; color: #1e3264;
      margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
    }
    .badge { background: #e8f5e9; color: #2e7d32; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    .leads-table-wrap { background: #fff; border-radius: 8px; border: 1px solid #c5cfe0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; color: #5a6e99; font-weight: 600; text-align: left; padding: 10px 14px; border-bottom: 1px solid #e2e8f0; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .status-novo        { background: #e3f2fd; color: #1565c0; }
    .status-em_contato  { background: #fff8e1; color: #e65100; }
    .status-agendado    { background: #e8f5e9; color: #2e7d32; }
    .status-fechado     { background: #fce4ec; color: #c62828; }

    .btn-detail {
      background: none; border: 1px solid #c5cfe0; color: #1e3264;
      padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;
    }
    .btn-detail:hover { background: #f0f4f8; }

    select.status-select {
      border: 1px solid #c5cfe0; border-radius: 5px; padding: 4px 8px;
      font-size: 12px; background: #fff; cursor: pointer;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 100; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px; width: 100%; max-width: 560px;
      max-height: 80vh; overflow-y: auto; padding: 28px;
    }
    .modal h3 { font-size: 16px; color: #1e3264; margin-bottom: 4px; }
    .modal .sub { font-size: 13px; color: #5a6e99; margin-bottom: 20px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 20px; }
    .info-item .lbl { font-size: 11px; color: #5a6e99; font-weight: 600; text-transform: uppercase; }
    .info-item .val { font-size: 14px; color: #1e3264; margin-top: 2px; }

    .files-section h4 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 6px;
    }
    .file-item .file-name { font-size: 13px; color: #1e3264; }
    .file-item .file-tipo { font-size: 11px; color: #5a6e99; margin-top: 2px; }
    .btn-download {
      background: #2e7d32; color: #fff; border: none; padding: 5px 12px;
      border-radius: 5px; font-size: 12px; cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .btn-download:hover { background: #256427; }
    .no-files { font-size: 13px; color: #5a6e99; padding: 12px 0; }

    .modal-close {
      float: right; background: none; border: none; font-size: 20px;
      cursor: pointer; color: #5a6e99; line-height: 1;
    }
    .loading { text-align: center; color: #5a6e99; padding: 40px; }
    .empty   { text-align: center; color: #5a6e99; padding: 40px; }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#1e3264"/>
        <path d="M20 8L28 13V27L20 32L12 27V13L20 8Z" stroke="#2e7d32" stroke-width="2" fill="none"/>
        <path d="M16 20L19 23L24 17" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Health<em>Previ</em></span>
    </div>
    <h2>Painel de Leads — Acesso restrito</h2>
    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" />
    </div>
    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" />
    </div>
    <button class="btn-primary" onclick="login()">Entrar</button>
    <p class="login-error" id="loginError">E-mail ou senha incorretos.</p>
  </div>
</div>

<!-- ── APP ── -->
<div id="appScreen">
  <header>
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#2e4a8a"/>
        <path d="M20 8L28 13V27L20 32L12 27V13L20 8Z" stroke="#66bb6a" stroke-width="2" fill="none"/>
        <path d="M16 20L19 23L24 17" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Health<em>Previ</em> — Leads</span>
    </div>
    <div class="user-info">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>

  <main>
    <div class="stats" id="statsRow">
      <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Total de leads</div></div>
      <div class="stat-card"><div class="num" id="statNovo">—</div><div class="lbl">Novos</div></div>
      <div class="stat-card"><div class="num" id="statContato">—</div><div class="lbl">Em contato</div></div>
      <div class="stat-card"><div class="num" id="statAgendado">—</div><div class="lbl">Agendados</div></div>
    </div>

    <div class="section-title">
      Leads qualificados <span class="badge" id="countBadge">0</span>
    </div>

    <div class="leads-table-wrap">
      <div class="loading" id="tableLoading">Carregando...</div>
      <div class="empty" id="tableEmpty" style="display:none">Nenhum lead ainda.</div>
      <table id="leadsTable" style="display:none">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Tipo de Laudo</th>
            <th>Especialidade</th>
            <th>Data</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leadsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalNome"></h3>
    <p class="sub" id="modalTel"></p>
    <div class="info-grid" id="modalInfo"></div>
    <div class="files-section">
      <h4>Documentos enviados</h4>
      <div id="modalFiles"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://zwmuabdjbezyhnealamx.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3bXVhYmRqYmV6eWhuZWFsYW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTg1OTcsImV4cCI6MjA5OTg3NDU5N30.hQv-aIn_g6MHOuMnUtWexSnVP15fcMbjCeLMdLLbBeM';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Auth ──────────────────────────────────────
  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha  = document.getElementById('senha').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) {
      document.getElementById('loginError').style.display = 'block';
    } else {
      showApp(email);
    }
  }

  document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function logout() {
    await sb.auth.signOut();
    document.getElementById('appScreen').style.display  = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  function showApp(email) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'block';
    document.getElementById('userEmail').textContent = email;
    loadLeads();
  }

  // ── Leads ─────────────────────────────────────
  let allLeads = [];

  async function loadLeads() {
    const { data, error } = await sb.from('leads').select('*').order('criado_em', { ascending: false });
    if (error) { document.getElementById('tableLoading').textContent = 'Erro ao carregar.'; return; }

    allLeads = data || [];
    renderStats(allLeads);
    renderTable(allLeads);
  }

  function renderStats(leads) {
    document.getElementById('statTotal').textContent    = leads.length;
    document.getElementById('statNovo').textContent     = leads.filter(l => l.status === 'novo').length;
    document.getElementById('statContato').textContent  = leads.filter(l => l.status === 'em_contato').length;
    document.getElementById('statAgendado').textContent = leads.filter(l => l.status === 'agendado').length;
    document.getElementById('countBadge').textContent   = leads.length;
  }

  function renderTable(leads) {
    document.getElementById('tableLoading').style.display = 'none';
    if (leads.length === 0) { document.getElementById('tableEmpty').style.display = 'block'; return; }

    document.getElementById('leadsTable').style.display = 'table';
    const tbody = document.getElementById('leadsBody');
    tbody.innerHTML = '';

    leads.forEach(l => {
      const tr = document.createElement('tr');
      const data = l.criado_em ? new Date(l.criado_em).toLocaleDateString('pt-BR') : '—';
      const statusClass = `status-${l.status || 'novo'}`;
      const statusLabel = { novo: 'Novo', em_contato: 'Em contato', agendado: 'Agendado', fechado: 'Fechado' }[l.status] || l.status;

      tr.innerHTML = `
        <td><strong>${l.nome || l.nome_contato_wa || '—'}</strong></td>
        <td>${formatTel(l.telefone)}</td>
        <td>${l.tipo_laudo || '—'}</td>
        <td>${l.especialidade || '—'}</td>
        <td>${data}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${l.id}', this.value)">
            <option value="novo"       ${l.status==='novo'?'selected':''}>Novo</option>
            <option value="em_contato" ${l.status==='em_contato'?'selected':''}>Em contato</option>
            <option value="agendado"   ${l.status==='agendado'?'selected':''}>Agendado</option>
            <option value="fechado"    ${l.status==='fechado'?'selected':''}>Fechado</option>
          </select>
        </td>
        <td><button class="btn-detail" onclick="openModal(${JSON.stringify(l).replace(/"/g,'&quot;')})">Ver detalhes</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function formatTel(t) {
    if (!t) return '—';
    const d = t.replace(/\D/g,'');
    if (d.length >= 13) return `+${d.slice(0,2)} (${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`;
    return t;
  }

  async function updateStatus(id, status) {
    await sb.from('leads').update({ status }).eq('id', id);
    const lead = allLeads.find(l => l.id === id);
    if (lead) lead.status = status;
    renderStats(allLeads);
  }

  // ── Modal ─────────────────────────────────────
  async function openModal(lead) {
    document.getElementById('modalNome').textContent = lead.nome || lead.nome_contato_wa || 'Paciente';
    document.getElementById('modalTel').textContent  = formatTel(lead.telefone);

    const bool = v => v ? '✅ Sim' : '❌ Não';
    document.getElementById('modalInfo').innerHTML = `
      <div class="info-item"><div class="lbl">Tipo de laudo</div><div class="val">${lead.tipo_laudo || '—'}</div></div>
      <div class="info-item"><div class="lbl">Especialidade</div><div class="val">${lead.especialidade || '—'}</div></div>
      <div class="info-item"><div class="lbl">Atestados</div><div class="val">${bool(lead.tem_atestados)}</div></div>
      <div class="info-item"><div class="lbl">Exames</div><div class="val">${bool(lead.tem_exames)}</div></div>
      <div class="info-item"><div class="lbl">Prontuário</div><div class="val">${bool(lead.tem_prontuario)}</div></div>
      <div class="info-item"><div class="lbl">Status</div><div class="val">${lead.status || 'novo'}</div></div>
    `;

    document.getElementById('modalFiles').innerHTML = '<p class="no-files">Carregando arquivos...</p>';
    document.getElementById('modalOverlay').classList.add('open');

    const { data: arquivos } = await sb.from('arquivos').select('*').eq('telefone', lead.telefone).order('criado_em');
    renderFiles(arquivos || []);
  }

  async function renderFiles(arquivos) {
    const container = document.getElementById('modalFiles');
    if (arquivos.length === 0) { container.innerHTML = '<p class="no-files">Nenhum documento enviado.</p>'; return; }

    const tipoLabel = { atestados: 'Atestado médico', exames: 'Exame médico', prontuario: 'Prontuário médico' };
    let html = '';

    for (const arq of arquivos) {
      const label = tipoLabel[arq.tipo] || arq.tipo || 'Documento';
      const data  = arq.criado_em ? new Date(arq.criado_em).toLocaleDateString('pt-BR') : '';

      // Gera URL assinada (válida por 1h)
      const { data: signed } = await sb.storage.from('documentos').createSignedUrl(arq.url_storage, 3600);
      const url = signed?.signedUrl || '#';

      html += `
        <div class="file-item">
          <div>
            <div class="file-name">${arq.nome_arquivo || 'arquivo'}</div>
            <div class="file-tipo">${label} · ${data}</div>
          </div>
          <a href="${url}" target="_blank" class="btn-download">⬇ Baixar</a>
        </div>`;
    }
    container.innerHTML = html;
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

  // ── Init ──────────────────────────────────────
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) showApp(session.user.email);
  })();
</script>
</body>
</html>
